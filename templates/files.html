<!DOCTYPE html>
<html>
<head>
    <title>ไฟล์ทั้งหมด</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">📂 รายการไฟล์ทั้งหมด</h2>

    <div class="mb-3 text-end">
        <a href="/" class="btn btn-secondary">⬅️ กลับหน้าหลัก</a>
    </div>

    <div class="card shadow">
        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>เจ้าที่สั่ง</th>
                        <th>เกมส์</th>
                        <th>วันที่</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>

                <tbody>
                    {% for f in files %}
                    <tr>
                        <td>{{ f[1] }}</td>
                        <td>{{ f[2] }}</td>
                        <td>{{ f[3] }}</td>

                        <td>
                            <!-- ดูข้อมูลในไฟล์ -->
                            <a href="/view_file/{{ f[0] }}" class="btn btn-sm btn-primary">
                                🔍 ดู
                            </a>

                            <!-- ลบ -->
                            <a href="/delete_file/{{ f[0] }}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('ลบไฟล์นี้ทั้งหมด?')">
                               🗑️ ลบ
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
