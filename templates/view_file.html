
<!DOCTYPE html>
<html>
<head>
    <title>รายละเอียดไฟล์</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4 text-center">📄 รายละเอียดข้อมูลที่อัปโหลด</h2>

    <div class="mb-3 d-flex justify-content-between">
        <a href="/files" class="btn btn-secondary">⬅️ กลับ</a>
    </div>

    <div class="card shadow">
        <div class="card-body table-responsive">

            <table class="table table-bordered table-hover table-sm">
                <thead class="table-dark">
                    <tr>
                        <th>ชื่อเกม</th>
                        <th>แพ็ค</th>
                        <th>จำนวนดอล</th>
                        <th>เลข GPA</th>
                        <th>เวลา</th>
                        <th>ว่าง</th>
                        <th>ข้อมูลประจำตัวลูกค้าชั่วคราว</th>
                        <th>ข้อมูลประจำตัวลูกค้า</th>
                        <th>เวลาในการสร้างบัตรกำนัล</th>
                        <th>ว่าง</th>
                        <th>รหัสเกียร์</th>
                    </tr>
                </thead>

                <tbody>
                    {% for row in rows %}
                    <tr>
                        {% for col in row %}
                        <td>{{ col }}</td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
