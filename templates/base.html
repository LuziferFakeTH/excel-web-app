<!DOCTYPE html>
<html lang="th">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Excel System{% endblock %}</title>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Prompt',sans-serif;

    background:
        radial-gradient(circle at top,
        #1b1028 0%,
        #0a0710 45%,
        #050507 100%);

    color:#ffffff;

    min-height:100vh;

    overflow-x:hidden;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:
        radial-gradient(circle at 20% 20%,
        rgba(255,0,153,0.12),
        transparent 25%),

        radial-gradient(circle at 80% 10%,
        rgba(140,0,255,0.10),
        transparent 25%),

        radial-gradient(circle at 50% 100%,
        rgba(0,225,255,0.08),
        transparent 30%);

    z-index:-1;
}

/* =========================
   TITLE
========================= */

.page-title{

    font-size:38px;
    font-weight:700;

    color:#ff66cc;

    text-shadow:
        0 0 10px rgba(255,102,204,0.7),
        0 0 25px rgba(255,102,204,0.5);

    letter-spacing:1px;
}

/* =========================
   CARD
========================= */

.card{

    background:
        linear-gradient(
            145deg,
            rgba(25,25,35,0.92),
            rgba(12,12,18,0.95)
        );

    border:1px solid rgba(255,255,255,0.05);

    border-radius:22px;

    overflow:hidden;

    box-shadow:
        0 10px 40px rgba(0,0,0,0.55),
        0 0 20px rgba(255,0,170,0.05);

    backdrop-filter:blur(10px);
}

.card-header{

    background:#151B2D !important;

    color:white;

    font-weight:600;

    border:none;

    padding:16px 22px;

    letter-spacing:0.5px;
}

/* =========================
   INPUT
========================= */

.form-control{

    background:#11131a;

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    border-radius:14px;

    padding:12px 15px;

    transition:0.25s;
}

.form-control:focus{

    background:#151821;

    color:white;

    border-color:#ff4fc3;

    box-shadow:
        0 0 0 0.15rem rgba(255,79,195,0.18),
        0 0 20px rgba(255,79,195,0.25);
}

/* =========================
   BUTTON
========================= */

.btn{

    border:none;
    border-radius:14px;

    font-weight:500;

    transition:0.25s ease;
}

.btn-primary,
.btn-success{

    background:
        linear-gradient(
            45deg,
            #ff2f92,
            #d946ef
        );

    color:white;
}

.btn-primary:hover,
.btn-success:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(255,0,170,0.35);
}

.btn-secondary{

    background:#23252f;
    color:#ddd;
}

.btn-secondary:hover{

    background:#343746;
    color:white;
}

.btn-danger{

    background:
        linear-gradient(
            45deg,
            #ff3b3b,
            #ff0066
        );

    color:white;
}

.btn-danger:hover{

    box-shadow:
        0 0 20px rgba(255,0,80,0.4);

    transform:translateY(-2px);
}

.btn-warning{

    background:
        linear-gradient(
            45deg,
            #ffb347,
            #ffcc33
        );

    color:black;
}

/* =========================
   TABLE
========================= */

.table{
    color:white;
}

.table thead{
    background:#151B2D;
}

.table thead th{

    color:#ffffff;

    border:none;

    background:#151B2D !important;
}

.table tbody tr{

    background:rgba(255,255,255,0.02);

    transition:0.2s;
}

.table tbody tr:hover{

    background:rgba(255,0,170,0.08);

    transform:none !important;
}

.table td,
.table th{
    border-color:rgba(255,255,255,0.05);
}

/* =========================
   PAGINATION
========================= */

.page-link{

    background:#14161d;
    border:none;

    color:#ff66cc;

    margin:0 3px;

    border-radius:10px;
}

.page-item.active .page-link{

    background:#ff2f92;
    color:white;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#0c0c12;
}

::-webkit-scrollbar-thumb{
    background:#ff2f92;
    border-radius:10px;
}

/* =========================
   STORAGE WIDGET
========================= */

#storage-box{

    position:fixed;

    top:15px;
    right:15px;

    width:210px;

    padding:15px;

    border-radius:18px;

    background:
        linear-gradient(
            145deg,
            rgba(20,20,30,0.92),
            rgba(10,10,15,0.95)
        );

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
        0 0 20px rgba(255,0,170,0.18);

    z-index:9999;

    backdrop-filter:blur(8px);
}

#storage-box .progress{

    background:#22242f;

    border-radius:20px;

    overflow:hidden;

    height:10px;
}

#storage-bar{

    transition:0.4s;

    border-radius:999px;
}

/* STORAGE COLORS */

.neon-green{

    background:#00ff9f !important;

    box-shadow:
        0 0 8px #00ff9f,
        0 0 15px #00ff9f;
}

.neon-yellow{

    background:#ffe600 !important;

    box-shadow:
        0 0 8px #ffe600,
        0 0 15px #ffe600;
}

.neon-red{

    background:#ff3b3b !important;

    box-shadow:
        0 0 8px #ff3b3b,
        0 0 15px #ff3b3b;
}

/* =========================
   CYBER LOGO LOADING
========================= */

#loading-screen{

    position:fixed;
    inset:0;

    display:none;

    align-items:center;
    justify-content:center;

    background:
        radial-gradient(circle at center,
        rgba(20,20,35,0.96),
        rgba(0,0,0,0.98));

    z-index:999999;

    overflow:hidden;
}

/* animated grid */

#loading-screen::before{

    content:"";

    position:absolute;
    inset:0;

    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

    background-size:40px 40px;

    animation:gridMove 4s linear infinite;
}

@keyframes gridMove{

    0%{
        transform:translateY(0px);
    }

    100%{
        transform:translateY(40px);
    }
}

.loading-wrapper{

    position:relative;

    width:300px;
    height:300px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* glow */

.logo-glow{

    position:absolute;

    width:120px;
    height:120px;

    border-radius:50%;

    background:
        radial-gradient(circle,
        rgba(255,0,170,0.35),
        transparent 70%);

    filter:blur(15px);

    animation:pulseGlow 2s infinite;
}

@keyframes pulseGlow{

    0%{
        transform:scale(1);
        opacity:0.7;
    }

    50%{
        transform:scale(1.2);
        opacity:1;
    }

    100%{
        transform:scale(1);
        opacity:0.7;
    }
}

/* rings */

.ring{

    position:absolute;

    border-radius:50%;

    border:2px solid rgba(255,255,255,0.12);
}

.ring1{

    width:240px;
    height:240px;

    border-top:2px solid #ff2f92;

    box-shadow:
        0 0 15px rgba(255,47,146,0.6);

    animation:spin 4s linear infinite;
}

.ring2{

    width:180px;
    height:180px;

    border-right:2px solid #c43cff;

    box-shadow:
        0 0 15px rgba(196,60,255,0.5);

    animation:spinReverse 3s linear infinite;
}

.ring3{

    width:130px;
    height:130px;

    border-bottom:2px solid #00e1ff;

    box-shadow:
        0 0 15px rgba(0,225,255,0.5);

    animation:spin 2s linear infinite;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{

    100%{
        transform:rotate(-360deg);
    }
}

/* logo */

.logo-core{

    position:relative;

    width:90px;
    height:90px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.08),
            rgba(255,255,255,0.02)
        );

    box-shadow:
        0 0 25px rgba(255,0,170,0.45),
        inset 0 0 20px rgba(255,255,255,0.08);

    animation:logoFloat 2s ease-in-out infinite;
}

.logo-core img{

    width:70%;
    height:70%;

    object-fit:contain;

    filter:
        drop-shadow(0 0 10px rgba(255,255,255,0.7));
}

@keyframes logoFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* text */

.loading-text{

    position:absolute;

    bottom:-50px;

    font-size:20px;
    font-weight:600;

    letter-spacing:5px;

    color:#ff66cc;

    text-shadow:
        0 0 10px rgba(255,0,170,0.7);

    animation:flicker 1s infinite alternate;
}

@keyframes flicker{

    from{
        opacity:0.5;
    }

    to{
        opacity:1;
    }
}

/* =========================
   ANIMATION
========================= */

.fade-up{

    animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<!-- =========================
     CYBER LOADING SCREEN
========================= -->

<div id="loading-screen">

    <div class="loading-wrapper">

        <div class="logo-glow"></div>

        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>

        <div class="logo-core">
            <img src="/static/logo.png" alt="logo">
        </div>

        <div class="loading-text">
            SYSTEM LOADING
        </div>

    </div>

</div>

<div class="container py-5 fade-up">

{% block content %}
{% endblock %}

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const loading = document.getElementById("loading-screen");

    // LINK LOADING
    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function(){

            const href = this.getAttribute("href");

            if(
                href &&
                !href.startsWith("#") &&
                !href.startsWith("javascript")
            ){
                loading.style.display = "flex";
            }

        });

    });

    // FORM LOADING
    document.querySelectorAll("form").forEach(form => {

        form.addEventListener("submit", function(){

            loading.style.display = "flex";

        });

    });

    // STORAGE BAR COLOR
    let percent = {{ storage.percent_used|default(0) }};
    let bar = document.getElementById("storage-bar");

    if(bar){

        if(percent < 30){

            bar.classList.add("neon-green");

        }else if(percent < 80){

            bar.classList.add("neon-yellow");

        }else{

            bar.classList.add("neon-red");
        }

    }

});

</script>

</body>
</html>
