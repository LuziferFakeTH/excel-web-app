<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Excel Data System</title>

    <!-- LOGO -->
    <link rel="icon"
          type="image/png"
          href="/static/logo.png">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

body{
    background:#0f172a;
    color:#e2e8f0;
}

/* =========================
   STORAGE BOX
========================= */

#storage-box{
    position:fixed;

    top:10px;
    right:15px;

    width:190px;

    padding:12px;

    background:#111827;

    border-radius:14px;

    box-shadow:
        0 0 15px rgba(0,255,174,0.3);

    z-index:9999;

    border:1px solid rgba(0,255,174,0.2);
}

#storage-box .title{
    font-weight:bold;
    margin-bottom:5px;

    color:#00ffae;

    text-shadow:0 0 10px #00ffae;
}

#storage-box .progress{
    background:#1e293b;
    height:10px;
}

.neon-green{
    background:#00ffae !important;
    box-shadow:0 0 10px #00ffae;
}

.neon-yellow{
    background:#ffe600 !important;
    box-shadow:0 0 10px #ffe600;
}

.neon-red{
    background:#ff3b3b !important;
    box-shadow:0 0 10px #ff3b3b;
}

/* =========================
   CYBER LOADING
========================= */

#loading-screen{
    position: fixed;
    inset: 0;

    background:
        radial-gradient(circle at center,
        rgba(0,255,170,0.08),
        rgba(0,0,0,0.95));

    display: none;

    align-items: center;
    justify-content: center;

    z-index: 999999;

    overflow: hidden;

    backdrop-filter: blur(5px);
}

#loading-screen::before{
    content:"";

    position:absolute;
    inset:0;

    background-image:
        linear-gradient(rgba(0,255,170,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.08) 1px, transparent 1px);

    background-size:40px 40px;

    animation:gridMove 4s linear infinite;
}

@keyframes gridMove{
    0%{
        transform:translateY(0px);
    }
    100%{
        transform:translateY(40px);
    }
}

.cyber-container{
    position:relative;

    width:260px;
    height:260px;

    display:flex;
    align-items:center;
    justify-content:center;
}

.ring{
    position:absolute;

    border-radius:50%;

    border:2px solid #00ffae;

    box-shadow:
        0 0 10px #00ffae,
        inset 0 0 10px #00ffae;

    animation:spin linear infinite;
}

.ring1{
    width:220px;
    height:220px;

    border-top-color:transparent;

    animation-duration:4s;
}

.ring2{
    width:170px;
    height:170px;

    border-right-color:transparent;

    animation-duration:3s;
    animation-direction:reverse;
}

.ring3{
    width:120px;
    height:120px;

    border-bottom-color:transparent;

    animation-duration:2s;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.core{
    width:70px;
    height:70px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:34px;

    color:#00ffae;

    background:rgba(0,255,174,0.08);

    box-shadow:
        0 0 20px #00ffae,
        inset 0 0 20px #00ffae;

    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.1);
    }
    100%{
        transform:scale(1);
    }
}

.loading-text{
    position:absolute;

    bottom:-50px;

    color:#00ffae;

    font-size:22px;

    letter-spacing:5px;

    text-shadow:
        0 0 5px #00ffae,
        0 0 15px #00ffae;

    animation:flicker 1s infinite alternate;
}

@keyframes flicker{
    0%{
        opacity:0.7;
    }
    100%{
        opacity:1;
    }
}

</style>

</head>

<body>

<!-- =========================
     STORAGE WIDGET
========================= -->

<div id="storage-box">

    <div class="title">
        💾 STORAGE
    </div>

    <div class="small text-end">
        {{ storage.percent_used }}%
    </div>

    <div class="progress">

        <div id="storage-bar"
             class="progress-bar"
             style="width: {{ storage.percent_used }}%;">
        </div>

    </div>

    <div class="small text-end mt-1">
        {{ storage.remaining_kb }} KB left
    </div>

</div>

<!-- =========================
     CYBER LOADING
========================= -->

<div id="loading-screen">

    <div class="cyber-container">

        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>

        <div class="core">
            ⚡
        </div>

        <div class="loading-text">
            CYBER LOADING
        </div>

    </div>

</div>

<!-- =========================
     PAGE CONTENT
========================= -->

{% block content %}
{% endblock %}

<script>

/* STORAGE COLOR */

document.addEventListener("DOMContentLoaded", function(){

    const percent = Number("{{ storage.percent_used }}");

    const bar = document.getElementById("storage-bar");

    if(percent < 30){

        bar.classList.add("neon-green");

    }else if(percent < 80){

        bar.classList.add("neon-yellow");

    }else{

        bar.classList.add("neon-red");

    }

});

/* LOADING */

document.addEventListener("DOMContentLoaded", function(){

    const loading = document.getElementById("loading-screen");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function(){

            const href = link.getAttribute("href");

            if(
                href &&
                !href.startsWith("#") &&
                !href.startsWith("javascript")
            ){
                loading.style.display = "flex";
            }

        });

    });

    document.querySelectorAll("form").forEach(form => {

        form.addEventListener("submit", function(){

            loading.style.display = "flex";

        });

    });

});

</script>

</body>
</html>
