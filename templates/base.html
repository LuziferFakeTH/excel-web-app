<!DOCTYPE html>
<html lang="th">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Excel System{% endblock %}</title>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Prompt',sans-serif;

    background:
        radial-gradient(circle at top,
        #1b1028 0%,
        #0a0710 45%,
        #050507 100%);

    color:#ffffff;

    min-height:100vh;

    overflow-x:hidden;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{
    content:"";

    position:fixed;
    inset:0;

    background:
        radial-gradient(circle at 20% 20%,
        rgba(255,0,153,0.12),
        transparent 25%),

        radial-gradient(circle at 80% 10%,
        rgba(140,0,255,0.10),
        transparent 25%),

        radial-gradient(circle at 50% 100%,
        rgba(0,225,255,0.08),
        transparent 30%);

    z-index:-1;
}

/* =========================
   TITLE
========================= */

.page-title{
    font-size:38px;
    font-weight:700;

    color:#ff66cc;

    text-shadow:
        0 0 10px rgba(255,102,204,0.7),
        0 0 25px rgba(255,102,204,0.5);

    letter-spacing:1px;
}

/* =========================
   CARD
========================= */

.card{
    background:
        linear-gradient(
            145deg,
            rgba(25,25,35,0.92),
            rgba(12,12,18,0.95)
        );

    border:1px solid rgba(255,255,255,0.05);

    border-radius:22px;

    overflow:hidden;

    box-shadow:
        0 10px 40px rgba(0,0,0,0.55),
        0 0 20px rgba(255,0,170,0.05);

    backdrop-filter:blur(10px);
}

.card-header{
    background:
        linear-gradient(
            90deg,
            #ff2f92,
            #c43cff,
            #7d5cff
        );

    color:white;

    font-weight:600;

    border:none;

    padding:16px 22px;

    letter-spacing:0.5px;
}

/* =========================
   INPUT
========================= */

.form-control{
    background:#11131a;

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    border-radius:14px;

    padding:12px 15px;

    transition:0.25s;
}

.form-control:focus{

    background:#151821;

    color:white;

    border-color:#ff4fc3;

    box-shadow:
        0 0 0 0.15rem rgba(255,79,195,0.18),
        0 0 20px rgba(255,79,195,0.25);
}

/* =========================
   BUTTON
========================= */

.btn{
    border:none;
    border-radius:14px;

    font-weight:500;

    transition:0.25s ease;
}

/* MAIN BUTTON */

.btn-primary,
.btn-success{

    background:
        linear-gradient(
            45deg,
            #ff2f92,
            #d946ef
        );

    color:white;
}

.btn-primary:hover,
.btn-success:hover{

    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(255,0,170,0.35);
}

/* SECONDARY */

.btn-secondary{

    background:#23252f;
    color:#ddd;
}

.btn-secondary:hover{

    background:#343746;
    color:white;
}

/* DANGER */

.btn-danger{

    background:
        linear-gradient(
            45deg,
            #ff3b3b,
            #ff0066
        );

    color:white;
}

.btn-danger:hover{

    box-shadow:
        0 0 20px rgba(255,0,80,0.4);

    transform:translateY(-2px);
}

/* WARNING */

.btn-warning{

    background:
        linear-gradient(
            45deg,
            #ffb347,
            #ffcc33
        );

    color:black;
}

/* =========================
   TABLE
========================= */

.table{
    color:white;
}

.table thead{

    background:#0d0f16;
}

.table thead th{

    color:#ff66cc;

    border:none;
}

.table tbody tr{

    background:rgba(255,255,255,0.02);

    transition:0.2s;
}

.table tbody tr:hover{

    background:rgba(255,0,170,0.08);
}

.table td,
.table th{
    border-color:rgba(255,255,255,0.05);
}

/* =========================
   PAGINATION
========================= */

.page-link{

    background:#14161d;
    border:none;

    color:#ff66cc;

    margin:0 3px;

    border-radius:10px;
}

.page-item.active .page-link{

    background:#ff2f92;
    color:white;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#0c0c12;
}

::-webkit-scrollbar-thumb{
    background:#ff2f92;
    border-radius:10px;
}

/* =========================
   STORAGE WIDGET
========================= */

#storage-box{

    position:fixed;

    top:15px;
    right:15px;

    width:210px;

    padding:15px;

    border-radius:18px;

    background:
        linear-gradient(
            145deg,
            rgba(20,20,30,0.92),
            rgba(10,10,15,0.95)
        );

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
        0 0 20px rgba(255,0,170,0.18);

    z-index:9999;

    backdrop-filter:blur(8px);
}

.progress{

    background:#22242f;

    border-radius:20px;

    overflow:hidden;
}

.progress-bar{

    background:
        linear-gradient(
            90deg,
            #ff2f92,
            #d946ef
        );
}

/* =========================
   LOADING SCREEN
========================= */

#loading-screen{

    position:fixed;
    inset:0;

    background:
        radial-gradient(circle,
        rgba(15,15,20,0.92),
        rgba(0,0,0,0.98));

    display:none;

    align-items:center;
    justify-content:center;

    z-index:999999;
}

.loading-box{

    text-align:center;
}

.loading-ring{

    width:120px;
    height:120px;

    border-radius:50%;

    border:4px solid rgba(255,255,255,0.08);

    border-top:4px solid #ff2f92;

    animation:spin 1s linear infinite;

    margin:auto;
}

.loading-text{

    margin-top:20px;

    color:#ff66cc;

    letter-spacing:4px;

    font-size:20px;

    text-shadow:
        0 0 10px rgba(255,0,170,0.7);
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* =========================
   ANIMATION
========================= */

.fade-up{

    animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading-screen">

    <div class="loading-box">

        <div class="loading-ring"></div>

        <div class="loading-text">
            LOADING
        </div>

    </div>

</div>

<div class="container py-5 fade-up">

{% block content %}
{% endblock %}

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const loading = document.getElementById("loading-screen");

    document.querySelectorAll("a").forEach(link => {

        link.addEventListener("click", function(){

            const href = this.getAttribute("href");

            if(
                href &&
                !href.startsWith("#") &&
                !href.startsWith("javascript")
            ){
                loading.style.display = "flex";
            }

        });

    });

    document.querySelectorAll("form").forEach(form => {

        form.addEventListener("submit", function(){

            loading.style.display = "flex";

        });

    });

});

</script>

</body>
</html>
