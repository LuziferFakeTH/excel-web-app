{% extends "base.html" %}

{% block content %}

<style>

.delete-wrapper{
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;
}

.delete-box{
    text-align:center;

    padding:45px;

    border-radius:25px;

    background:rgba(15,23,42,0.85);

    box-shadow:
        0 0 30px rgba(255,0,0,0.25);

    border:1px solid rgba(255,59,59,0.25);

    backdrop-filter:blur(10px);
}

.delete-icon{
    font-size:90px;

    color:#ff3b3b;

    text-shadow:
        0 0 10px #ff3b3b,
        0 0 25px #ff3b3b;

    animation:pop .5s ease;
}

@keyframes pop{

    0%{
        transform:scale(0.5);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

.delete-title{

    margin-top:15px;

    font-size:30px;

    color:#ff3b3b;

    text-shadow:
        0 0 10px #ff3b3b;
}

.delete-sub{

    margin-top:10px;

    color:#94a3b8;

    font-size:14px;
}

.btn-neon-red{

    margin-top:25px;

    padding:12px 28px;

    border-radius:12px;

    border:1px solid #ff3b3b;

    color:#ff3b3b;

    background:transparent;

    transition:.3s;
}

.btn-neon-red:hover{

    background:#ff3b3b;

    color:black;

    box-shadow:
        0 0 15px #ff3b3b;
}

</style>

<script>

setTimeout(() => {

    window.location.href = "/files";

}, 5000);

</script>

<div class="delete-wrapper">

    <div class="delete-box">

        <div class="delete-icon">
            ✖
        </div>

        <div class="delete-title">
            ลบไฟล์สำเร็จแล้ว
        </div>

        <div class="delete-sub">
            กำลังกลับไปหน้ารายการไฟล์...
        </div>

        <a href="/files" class="btn btn-neon-red">
            ⬅️ กลับหน้ารายการไฟล์
        </a>

    </div>

</div>

{% endblock %}
