<!DOCTYPE html>
<html>
<head>
    <title>แก้ไขข้อมูล</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning">
            ✏️ แก้ไขข้อมูล
        </div>

        <div class="card-body">

            <form method="post" action="/update/{{ row_id }}">

                <div class="row">
                    {% for i in range(11) %}
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Column {{ i }}</label>
                        <input type="text" name="col{{ i }}" value="{{ row[i] }}" class="form-control">
                    </div>
                    {% endfor %}
                </div>

                <button class="btn btn-success">💾 บันทึก</button>
                <a href="/" class="btn btn-secondary">⬅️ กลับ</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
