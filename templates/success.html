{% extends "base.html" %}

{% block title %}สำเร็จ{% endblock %}

{% block content %}

<style>

.fullscreen-success{

    position:fixed;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    background:
        radial-gradient(circle at top,
        #031b16,
        #000000);
}

/* particles */

.fullscreen-success::before{

    content:"";

    position:absolute;
    inset:0;

    background-image:
        radial-gradient(rgba(0,255,170,0.15) 1px, transparent 1px);

    background-size:30px 30px;

    opacity:0.3;

    animation:moveGrid 10s linear infinite;
}

@keyframes moveGrid{

    0%{
        transform:translateY(0);
    }

    100%{
        transform:translateY(30px);
    }
}

.success-box{

    position:relative;

    width:420px;

    padding:55px 40px;

    text-align:center;

    border-radius:28px;

    background:
        linear-gradient(
            145deg,
            rgba(10,20,20,0.95),
            rgba(0,0,0,0.95)
        );

    border:1px solid rgba(0,255,170,0.25);

    box-shadow:
        0 0 25px rgba(0,255,170,0.15),
        0 0 80px rgba(0,255,170,0.08);

    overflow:hidden;

    backdrop-filter:blur(10px);
}

/* glow border */

.success-box::before{

    content:"";

    position:absolute;
    inset:-2px;

    border-radius:30px;

    background:
        linear-gradient(
            45deg,
            transparent,
            rgba(0,255,170,0.25),
            transparent
        );

    animation:borderMove 4s linear infinite;
}

@keyframes borderMove{

    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }
}

.inner{

    position:relative;

    z-index:2;
}

.checkmark{

    width:120px;
    height:120px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:64px;

    color:#00ffae;

    background:
        radial-gradient(
            circle,
            rgba(0,255,170,0.15),
            rgba(0,255,170,0.02)
        );

    border:2px solid rgba(0,255,170,0.5);

    box-shadow:
        0 0 25px #00ffae,
        inset 0 0 25px rgba(0,255,170,0.3);

    animation:
        popIn 0.6s ease,
        pulse 1.8s infinite;
}

@keyframes popIn{

    0%{
        transform:scale(0.3);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes pulse{

    0%{
        box-shadow:
            0 0 15px #00ffae,
            inset 0 0 15px rgba(0,255,170,0.2);
    }

    50%{
        box-shadow:
            0 0 35px #00ffae,
            inset 0 0 30px rgba(0,255,170,0.4);
    }

    100%{
        box-shadow:
            0 0 15px #00ffae,
            inset 0 0 15px rgba(0,255,170,0.2);
    }
}

.title{

    margin-top:28px;

    font-size:34px;
    font-weight:700;

    letter-spacing:2px;

    color:#00ffae;

    text-shadow:
        0 0 10px #00ffae,
        0 0 25px rgba(0,255,170,0.5);
}

.subtitle{

    margin-top:10px;

    color:#9fffe0;

    font-size:15px;

    opacity:0.85;

    letter-spacing:1px;
}

.btn-back{

    margin-top:35px;

    padding:12px 30px;

    border-radius:14px;

    border:1px solid #00ffae;

    background:transparent;

    color:#00ffae;

    font-weight:600;

    text-decoration:none;

    transition:0.3s;

    display:inline-block;

    box-shadow:
        0 0 10px rgba(0,255,170,0.15);
}

.btn-back:hover{

    background:#00ffae;

    color:#000;

    transform:translateY(-3px);

    box-shadow:
        0 0 25px #00ffae;
}

.redirect{

    margin-top:18px;

    font-size:13px;

    color:#8fbfb0;
}

</style>

<script>

setTimeout(() => {

    window.location.href = "/";

}, 5);

</script>

<div class="fullscreen-success">

    <div class="success-box">

        <div class="inner">

            <div class="checkmark">
                ✔
            </div>

            <div class="title">
                UPLOAD SUCCESS
            </div>

            <div class="subtitle">
                ระบบอัปโหลดไฟล์เรียบร้อยแล้ว
            </div>

            <a href="/" class="btn-back">
                ⬅ กลับหน้าหลัก
            </a>

            <div class="redirect">
                Auto Redirect...
            </div>

        </div>

    </div>

</div>

{% endblock %}
