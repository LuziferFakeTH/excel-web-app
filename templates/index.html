<!DOCTYPE html>
<html>
<head>
    <title>Excel System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        /* Header Title */
        h2 {
            color: #ff4da6;
            font-weight: bold;
        }

        /* Card */
        .card {
            border-radius: 15px;
            border: none;
        }

        .card-header {
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }

        /* Theme Colors */
        .bg-primary {
            background-color: #ff4da6 !important;
        }

        .bg-success {
            background-color: #ff66b2 !important;
        }

        .bg-dark {
            background-color: #212529 !important;
        }

        /* Buttons */
        .btn-success {
            background-color: #ff4da6;
            border: none;
        }

        .btn-success:hover {
            background-color: #e60073;
        }

        .btn-primary {
            background-color: #ff66b2;
            border: none;
        }

        .btn-primary:hover {
            background-color: #e60073;
        }

        .btn-warning {
            background-color: #ff99cc;
            border: none;
            color: #000;
        }

        .btn-danger {
            background-color: #000;
            border: none;
        }

        .btn-danger:hover {
            background-color: #333;
        }

        /* Table */
        .table-dark {
            background-color: #212529;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }

        tr:hover {
            background-color: #ffe6f0;
        }

        /* Inputs */
        .form-control:focus {
            border-color: #ff4da6;
            box-shadow: 0 0 0 0.2rem rgba(255, 77, 166, 0.25);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Excel Data System</h2>

    <!-- Upload -->
    <div class="card shadow mb-4">
        <div class="card-header text-black">
            📤 อัปโหลดไฟล์
        </div>

        <div class="card-body">
            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">เจ้าที่สั่ง</label>
                        <input list="customer_list" name="customer" class="form-control" required>
                        <datalist id="customer_list">
                            <option value="S5 เจ้าเหลือง">
                            <option value="S6 เจ้าแดง">
                            <option value="เจ้า 3">
                            <option value="เจ้า 4">
                            <option value="เจ้า 5">
                            <option value="CGC">
                        </datalist>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">เกมส์</label>
                        <input list="game_list" name="game" class="form-control" required>
                        <datalist id="game_list">
                            <option value="Call of duty">
                            <option value="Honkai Starrail">
                            <option value="Efootball Pes">
                            <option value="Wuthering Wave">
                            <option value="FC Mobile">
                            <option value="Last War">
                            <option value="Pokemon Go">
                            <option value="Pokemon TCG">
                            <option value="Zenless zone zero">
                        </datalist>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="file" name="file" class="form-control" required>
                </div>

                <button class="btn btn-success w-100">Upload</button>
            </form>
        </div>
    </div>

    <!-- Search -->
    <div class="card shadow mb-4">
        <div class="card-header bg-dark text-white">
            🔍 ค้นหาข้อมูล
        </div>

        <div class="card-body">
            <form action="/search" method="get" class="d-flex">
                <input type="text" name="q" class="form-control me-2" placeholder="พิมพ์คำค้น..." required>
                <button class="btn btn-primary">ค้นหา</button>
            </form>
        </div>
    </div>

    <!-- Result -->
    {% if results %}
    <div class="card shadow">
        <div class="card-header text-white">
            📄 ผลลัพธ์
        </div>

        <div class="card-body table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>เจ้าที่สั่ง</th>
                        <th>เกมส์</th>
                        <th>วันที่</th>
                        <th>แพ็ค</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in results %}
                    <tr>
                        <td>{{ r[2] }}</td>
                        <td>{{ r[3] }}</td>
                        <td>{{ r[4] }}</td>
                        <td>{{ r[5] }}</td>

                        <td>
                            <a href="/detail/{{ r[1] }}" class="btn btn-sm btn-warning">
                                ✏️ แก้ไข
                            </a>

                            <a href="/delete_file/{{ r[0] }}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('ลบไฟล์นี้ทั้งหมด?')">
                               🗑️ ลบ
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
