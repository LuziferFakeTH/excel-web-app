{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   LABEL
========================= */

label{
    color:#ffffff !important;
    font-weight:600;
    margin-bottom:6px;

    text-shadow:
        0 0 8px rgba(255,255,255,0.15);
}

/* =========================
   POWERED BY
========================= */

.powered-by{

    position:fixed;

    left:22px;
    bottom:18px;

    z-index:99999;

    font-size:13px;

    color:#ff66cc;

    letter-spacing:1px;

    opacity:0.85;

    text-shadow:
        0 0 8px rgba(255,0,170,0.6),
        0 0 15px rgba(255,0,170,0.3);

    animation:pulseText 2s infinite;
}

.powered-by span{
    color:#ffffff;
}

@keyframes pulseText{

    0%{
        opacity:0.7;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.7;
    }
}

/* =========================
   GOJO DOMAIN
========================= */

#gojo-domain{

    position:fixed;
    inset:0;

    z-index:999999;

    display:none;

    overflow:hidden;

    background:
        radial-gradient(circle at center,
        rgba(60,0,120,0.95) 0%,
        rgba(5,5,20,0.98) 60%,
        #000 100%);
}

/* moving particles */

#gojo-domain::before{

    content:"";

    position:absolute;
    inset:0;

    background-image:
        radial-gradient(rgba(140,0,255,0.18) 1px, transparent 1px);

    background-size:35px 35px;

    animation:spaceMove 8s linear infinite;
}

@keyframes spaceMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(35px);
    }
}

/* BLACK HOLE */

.black-hole{

    position:absolute;

    top:50%;
    left:50%;

    width:260px;
    height:260px;

    transform:translate(-50%, -50%);

    border-radius:50%;

    background:
        radial-gradient(circle,
        #000 20%,
        #240046 55%,
        rgba(120,0,255,0.6) 75%,
        transparent 100%);

    box-shadow:
        0 0 40px rgba(160,0,255,0.9),
        0 0 100px rgba(120,0,255,0.8),
        0 0 180px rgba(0,195,255,0.5);

    animation:
        blackHoleSpin 3s linear infinite,
        blackHolePulse 2s ease infinite;
}

@keyframes blackHoleSpin{

    from{
        transform:translate(-50%, -50%) rotate(0deg);
    }

    to{
        transform:translate(-50%, -50%) rotate(360deg);
    }
}

@keyframes blackHolePulse{

    0%{
        box-shadow:
            0 0 40px rgba(160,0,255,0.8),
            0 0 100px rgba(120,0,255,0.7);
    }

    50%{
        box-shadow:
            0 0 70px rgba(160,0,255,1),
            0 0 180px rgba(120,0,255,1);
    }

    100%{
        box-shadow:
            0 0 40px rgba(160,0,255,0.8),
            0 0 100px rgba(120,0,255,0.7);
    }
}

/* DOMAIN TEXT */

.domain-text{

    position:absolute;

    top:72%;
    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.domain-title{

    font-size:42px;
    font-weight:700;

    letter-spacing:5px;

    color:#c084fc;

    text-shadow:
        0 0 15px #a855f7,
        0 0 35px #7e22ce,
        0 0 70px #9333ea;

    animation:flicker 1.5s infinite;
}

.domain-sub{

    margin-top:14px;

    font-size:18px;

    color:#d8b4fe;

    letter-spacing:3px;

    text-shadow:
        0 0 10px rgba(255,255,255,0.4);
}

@keyframes flicker{

    0%{
        opacity:0.8;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.8;
    }
}

/* DOMAIN FLASH */

.domain-flash{

    position:absolute;

    inset:0;

    background:
        radial-gradient(circle,
        rgba(180,120,255,0.18),
        transparent 70%);

    animation:flashPulse 2s infinite;
}

@keyframes flashPulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }
}

</style>

<!-- STORAGE -->
<div id="storage-box">

    <div style="font-weight:bold; margin-bottom:4px;">
        💾 STORAGE
    </div>

    <div class="small text-end">
        {{ storage.percent_used }}%
    </div>

    <div class="progress" style="height:8px;">

        <div id="storage-bar"
             class="progress-bar"
             style="width:{{ storage.percent_used }}%;">
        </div>

    </div>

    <div class="small text-end mt-1">
        {{ storage.remaining_kb }} KB left
    </div>

    <div class="mt-2 text-center">

        <button onclick="runVacuum()"
                class="btn btn-sm w-100"
                style="
                    background:#7e22ce;
                    color:white;
                    box-shadow:
                        0 0 12px rgba(168,85,247,0.7),
                        0 0 25px rgba(120,0,255,0.4);
                ">

            🌀 Domain Clean Storage

        </button>

    </div>

</div>

<!-- DOMAIN EXPANSION -->

<div id="gojo-domain">

    <div class="domain-flash"></div>

    <div class="black-hole"></div>

    <div class="domain-text">

        <div class="domain-title">
            DOMAIN EXPANSION
        </div>

        <div class="domain-sub">
            CLEANING STORAGE...
        </div>

    </div>

    <!-- SOUND -->
    <audio id="domain-sound">
        <source src="/static/domain.mp3" type="audio/mpeg">
    </audio>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    let percent = {{ storage.percent_used }};
    let bar = document.getElementById("storage-bar");

    if(bar){

        if(percent < 30){

            bar.classList.add("neon-green");

        }else if(percent < 80){

            bar.classList.add("neon-yellow");

        }else{

            bar.classList.add("neon-red");
        }
    }
});

/* =========================
   RUN VACUUM
========================= */

function runVacuum(){

    let pass = prompt("🔒 ใส่รหัสก่อนล้าง Storage:");

    if(pass !== "081041"){

        alert("❌ รหัสไม่ถูกต้อง");
        return;
    }

    let confirmAction = confirm(
        "⚠️ DOMAIN EXPANSION ?\nระบบจะเข้าสู่โหมดล้าง Storage"
    );

    if(!confirmAction) return;

    const domain = document.getElementById("gojo-domain");
    const sound = document.getElementById("domain-sound");

    domain.style.display = "block";

    // play sound
    if(sound){

        sound.volume = 1;

        sound.play().catch(err => {
            console.log(err);
        });
    }

    // delay before vacuum
    setTimeout(() => {

        fetch("/vacuum?pass=" + pass)

        .then(res => res.text())

        .then(data => {

            alert(data);

            location.reload();

        })

        .catch(err => {

            alert("❌ เกิดข้อผิดพลาด");

            location.reload();

        });

    }, 2500);
}

</script>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        📊 Excel Data System 📊
    </h2>

    <div class="mb-3 text-end">

        <a href="/files" class="btn btn-info">
            📂 ดูไฟล์ทั้งหมด
        </a>

    </div>

    <!-- Upload -->

    <div class="card p-3 mb-4">

        <div class="card-header">
            📤 อัปโหลดไฟล์
        </div>

        <div class="card-body">

            <form action="/upload"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>เจ้าที่สั่ง</label>

                        <input list="customer_list"
                               name="customer"
                               class="form-control"
                               required>

                        <datalist id="customer_list">

                            <option value="S5 เจ้าเหลือง">
                            <option value="S6 เจ้าแดง">
                            <option value="เจ้า 3">
                            <option value="เจ้า 4">
                            <option value="เจ้า 5">
                            <option value="CGC">

                        </datalist>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>เกมส์</label>

                        <input list="game_list"
                               name="game"
                               class="form-control"
                               required>

                        <datalist id="game_list">

                            <option value="Call of duty">
                            <option value="Honkai Starrail">
                            <option value="Efootball Pes">
                            <option value="Wuthering Wave">
                            <option value="FC Mobile">
                            <option value="Last War">
                            <option value="Pokemon Go">
                            <option value="Pokemon TCG">
                            <option value="Zenless zone zero">

                        </datalist>

                    </div>

                </div>

                <div class="mb-3">

                    <input type="file"
                           name="file"
                           class="form-control"
                           required>

                </div>

                <button class="btn btn-success w-100">
                    Upload
                </button>

            </form>

        </div>

    </div>

</div>

<!-- POWERED -->

<div class="powered-by">

    ⚡ Powered by
    <span>MissSir.John</span>

</div>

{% endblock %}
