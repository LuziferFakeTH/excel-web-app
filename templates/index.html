<!DOCTYPE html>
<html>
<head>
    <title>Excel System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #2b0a1f);
            color: #fff;
        }

        h2 {
            font-weight: 600;
            background: linear-gradient(90deg, #ff4da6, #ff99cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Card */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
        }

        /* Inputs */
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
        }

        .form-control:focus {
            border-color: #ff4da6;
            box-shadow: 0 0 10px rgba(255,77,166,0.5);
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* Buttons */
        .btn-success, .btn-primary {
            background: linear-gradient(45deg, #ff4da6, #ff80bf);
            border: none;
            border-radius: 10px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-success:hover, .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,77,166,0.5);
        }

        .btn-warning {
            background: #ffb3d9;
            border: none;
            color: #000;
        }

        .btn-danger {
            background: #000;
            border: none;
        }

        /* Table */
        table {
            border-radius: 15px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(45deg, #ff4da6, #ff80bf);
        }

        thead th {
            color: #fff;
            border: none;
        }

        tbody tr {
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,77,166,0.2);
            transform: scale(1.01);
        }

        td, th {
            border: none !important;
        }

        /* Scroll */
        .table-responsive {
            border-radius: 15px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">📊 Excel Data System</h2>

    <!-- Upload -->
    <div class="card p-3 mb-4">
        <div class="card-header">📤 อัปโหลดไฟล์</div>

        <div class="card-body">
            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>เจ้าที่สั่ง</label>
                        <input list="customer_list" name="customer" class="form-control" required>
                        <datalist id="customer_list">
                            <option value="S5 เจ้าเหลือง">
                            <option value="S6 เจ้าแดง">
                            <option value="เจ้า 3">
                            <option value="เจ้า 4">
                            <option value="เจ้า 5">
                            <option value="CGC">
                        </datalist>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>เกมส์</label>
                        <input list="game_list" name="game" class="form-control" required>
                        <datalist id="game_list">
                            <option value="Call of duty">
                            <option value="Honkai Starrail">
                            <option value="Efootball Pes">
                            <option value="Wuthering Wave">
                            <option value="FC Mobile">
                            <option value="Last War">
                            <option value="Pokemon Go">
                            <option value="Pokemon TCG">
                            <option value="Zenless zone zero">
                        </datalist>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="file" name="file" class="form-control" required>
                </div>

                <button class="btn btn-success w-100">Upload</button>
            </form>
        </div>
    </div>

    <!-- Search -->
    <div class="card p-3 mb-4">
        <div class="card-header">🔍 ค้นหาข้อมูล</div>

        <div class="card-body">
            <form action="/search" method="get" class="d-flex">
                <input type="text" name="q" class="form-control me-2" placeholder="พิมพ์คำค้น..." required>
                <button class="btn btn-primary">ค้นหา</button>
            </form>
        </div>
    </div>

    <!-- Result -->
    {% if results %}
    <div class="card p-3">
        <div class="card-header">📄 ผลลัพธ์</div>

        <div class="card-body table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>เจ้าที่สั่ง</th>
                        <th>เกมส์</th>
                        <th>วันที่</th>
                        <th>แพ็ค</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in results %}
                    <tr>
                        <td>{{ r[2] }}</td>
                        <td>{{ r[3] }}</td>
                        <td>{{ r[4] }}</td>
                        <td>{{ r[5] }}</td>
                        <td>
                            <a href="/detail/{{ r[1] }}" class="btn btn-sm btn-warning">✏️</a>
                            <a href="/delete_file/{{ r[0] }}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('ลบไฟล์นี้ทั้งหมด?')">
                               🗑️
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
