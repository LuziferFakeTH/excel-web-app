{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   LABEL
========================= */

label{
    color:#ffffff !important;
    font-weight:600;
    margin-bottom:6px;
    text-shadow:0 0 8px rgba(255,255,255,0.15);
}

/* =========================
   POWERED BY
========================= */

.powered-by{

    position:fixed;

    left:20px;
    bottom:15px;

    z-index:9999;

    font-size:13px;

    color:#ff6666;

    letter-spacing:1px;

    opacity:0.9;

    text-shadow:
        0 0 10px rgba(255,0,0,0.6);
}

.powered-by span{
    color:#ffffff;
}

/* =========================
   SUKUNA DOMAIN
========================= */

#sukuna-domain{

    position:fixed;
    inset:0;

    z-index:999999;

    display:none;

    overflow:hidden;

    background:
        radial-gradient(circle at center,
        #3a0000 0%,
        #120000 35%,
        #000000 100%);
}

/* =========================
   STARS / ASH
========================= */

.stars,
.stars2,
.embers{

    position:absolute;
    inset:0;

    pointer-events:none;
}

.stars{

    background-image:
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(1px 1px at 100px 150px, #fff, transparent),
        radial-gradient(2px 2px at 300px 250px, #ff4444, transparent),
        radial-gradient(2px 2px at 500px 400px, #ffffff, transparent);

    background-size:700px 700px;

    animation:starMove 90s linear infinite;

    opacity:0.5;
}

.stars2{

    background-image:
        radial-gradient(1px 1px at 50px 50px, #ff8888, transparent),
        radial-gradient(2px 2px at 250px 200px, #fff, transparent),
        radial-gradient(1px 1px at 450px 500px, #ff3333, transparent);

    background-size:900px 900px;

    animation:starMove 120s linear infinite reverse;

    opacity:0.3;
}

.embers{

    background:
        repeating-radial-gradient(
            circle at center,
            rgba(255,50,50,0.08),
            transparent 40px
        );

    animation:pulseEmber 4s ease infinite;
}

@keyframes pulseEmber{

    0%{
        opacity:0.4;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.4;
    }
}

@keyframes starMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-1200px);
    }
}

/* =========================
   SHRINE
========================= */

.shrine{

    position:absolute;

    bottom:0;
    left:50%;

    transform:translateX(-50%);

    width:700px;
    height:320px;

    background:
        linear-gradient(to top,
        rgba(0,0,0,0.95),
        rgba(80,0,0,0.2));

    clip-path:polygon(
        10% 100%,
        18% 45%,
        30% 45%,
        35% 20%,
        50% 0%,
        65% 20%,
        70% 45%,
        82% 45%,
        90% 100%
    );

    box-shadow:
        0 0 40px rgba(255,0,0,0.4),
        0 0 100px rgba(255,0,0,0.2);

    animation:shrineGlow 2s infinite alternate;
}

@keyframes shrineGlow{

    from{
        filter:brightness(1);
    }

    to{
        filter:brightness(1.4);
    }
}

/* =========================
   RED MOON
========================= */

.red-moon{

    position:absolute;

    top:8%;
    left:50%;

    transform:translateX(-50%);

    width:240px;
    height:240px;

    border-radius:50%;

    background:
        radial-gradient(circle,
        #ff4444 0%,
        #990000 55%,
        transparent 100%);

    box-shadow:
        0 0 60px rgba(255,0,0,0.8),
        0 0 150px rgba(255,0,0,0.4);

    animation:moonPulse 3s infinite;
}

@keyframes moonPulse{

    0%{
        transform:translateX(-50%) scale(1);
    }

    50%{
        transform:translateX(-50%) scale(1.08);
    }

    100%{
        transform:translateX(-50%) scale(1);
    }
}

/* =========================
   LOGO
========================= */

.logo-container{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;

    animation:floatLogo 2s ease infinite;
}

.logo-container img{

    width:180px;
    height:180px;

    object-fit:contain;

    filter:
        drop-shadow(0 0 20px red)
        drop-shadow(0 0 50px crimson);
}

@keyframes floatLogo{

    0%{
        transform:translate(-50%,-50%) translateY(0);
    }

    50%{
        transform:translate(-50%,-50%) translateY(-12px);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0);
    }
}

/* =========================
   SLASH EFFECT
========================= */

.slash{

    position:absolute;

    top:50%;
    left:-20%;

    width:140%;
    height:8px;

    background:
        linear-gradient(
            90deg,
            transparent,
            #ff0000,
            #ffffff,
            #ff0000,
            transparent
        );

    transform:rotate(-18deg);

    box-shadow:
        0 0 20px red,
        0 0 40px crimson;

    opacity:0;

    z-index:20;
}

.slash.active{

    animation:slashAnim 0.8s ease forwards;
}

@keyframes slashAnim{

    0%{
        opacity:0;
        transform:translateX(-120%) rotate(-18deg);
    }

    30%{
        opacity:1;
    }

    100%{
        opacity:1;
        transform:translateX(120%) rotate(-18deg);
    }
}

/* =========================
   TEXT
========================= */

.domain-text{

    position:absolute;

    top:72%;
    left:50%;

    transform:translateX(-50%);

    text-align:center;

    z-index:50;
}

.domain-title{

    font-size:52px;
    font-weight:900;

    letter-spacing:8px;

    color:#ff4d4d;

    text-shadow:
        0 0 20px red,
        0 0 60px crimson,
        0 0 120px rgba(255,0,0,0.5);

    animation:titlePulse 1.8s infinite;
}

.domain-sub{

    margin-top:15px;

    font-size:20px;

    letter-spacing:5px;

    color:#ffd1d1;
}

.japanese{

    margin-top:20px;

    font-size:34px;

    color:#ffffff;

    text-shadow:
        0 0 20px red;

    letter-spacing:10px;
}

@keyframes titlePulse{

    0%{
        opacity:0.8;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.8;
    }
}

/* =========================
   SCREEN SHAKE
========================= */

.shake{

    animation:shakeScreen 0.15s infinite;
}

@keyframes shakeScreen{

    0%{
        transform:translate(2px, 2px);
    }

    25%{
        transform:translate(-2px, 1px);
    }

    50%{
        transform:translate(2px, -2px);
    }

    75%{
        transform:translate(-1px, 2px);
    }

    100%{
        transform:translate(1px, -1px);
    }
}

</style>

<!-- DOMAIN -->

<div id="sukuna-domain">

    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="embers"></div>

    <div class="red-moon"></div>

    <div class="shrine"></div>

    <div class="logo-container" id="logo-container">
        <img src="/static/logo.png">
    </div>

    <div class="slash" id="slash"></div>

    <div class="domain-text">

        <div class="domain-title">
            DOMAIN EXPANSION
        </div>

        <div class="domain-sub">
            CLEANING STORAGE...
        </div>

        <div class="japanese" id="japanese-text">
            伏魔御厨子
        </div>

    </div>

    <!-- SOUND -->

    <audio id="domain-sound">
        <source src="/static/domain.mp3" type="audio/mpeg">
    </audio>

    <audio id="slash-sound">
        <source src="/static/slash.mp3" type="audio/mpeg">
    </audio>

</div>

<!-- STORAGE -->

<div id="storage-box">

    <div style="font-weight:bold; margin-bottom:4px;">
        💾 STORAGE
    </div>

    <div class="small text-end">
        {{ storage.percent_used }}%
    </div>

    <div class="progress" style="height:8px;">

        <div id="storage-bar"
             class="progress-bar"
             style="width: {{ storage.percent_used }}%;">
        </div>

    </div>

    <div class="small text-end mt-1">
        {{ storage.remaining_kb }} KB left
    </div>

    <div class="mt-2 text-center">

        <button onclick="runVacuum()"
                class="btn btn-sm w-100"
                style="
                    background:#ff3b3b;
                    color:white;
                    box-shadow:0 0 10px rgba(255,0,0,0.4);
                ">

            🧹 ล้าง Storage

        </button>

    </div>

</div>

<script>

function runVacuum(){

    let pass = prompt("🔒 ใส่รหัสก่อนล้าง Storage:");

    if(pass !== "081041"){

        alert("❌ รหัสไม่ถูกต้อง");
        return;
    }

    let confirmAction = confirm(
        "⚠️ ระบบจะหยุดชั่วคราว\nยืนยันหรือไม่?"
    );

    if(!confirmAction) return;

    const domain = document.getElementById("sukuna-domain");

    domain.style.display = "block";

    document.body.classList.add("shake");

    // PLAY DOMAIN SOUND

    const domainSound = document.getElementById("domain-sound");

    domainSound.volume = 1;
    domainSound.play();

    // SLASH EFFECT

    setTimeout(() => {

        document.getElementById("slash")
                .classList
                .add("active");

        const slashSound =
            document.getElementById("slash-sound");

        slashSound.volume = 1;
        slashSound.play();

    }, 1800);

    // DESTROY LOGO

    setTimeout(() => {

        const logo =
            document.getElementById("logo-container");

        logo.style.transition = "1s";

        logo.style.transform =
            "translate(-50%,-50%) scale(0) rotate(720deg)";

        logo.style.opacity = "0";

    }, 2500);

    // PURPLE TEXT

    setTimeout(() => {

        document.getElementById("japanese-text")
            .innerHTML = "虚式 茈";

    }, 4200);

    // RUN VACUUM

    setTimeout(() => {

        fetch("/vacuum?pass=" + pass)

        .then(res => res.text())

        .then(data => {

            alert(data);

            location.reload();

        })

        .catch(err => {

            alert("❌ เกิดข้อผิดพลาด");

            location.reload();

        });

    }, 5200);
}

document.addEventListener("DOMContentLoaded", function(){

    let percent = {{ storage.percent_used }};
    let bar = document.getElementById("storage-bar");

    if(bar){

        if(percent < 30){

            bar.classList.add("neon-green");

        }else if(percent < 80){

            bar.classList.add("neon-yellow");

        }else{

            bar.classList.add("neon-red");
        }
    }
});

</script>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        📊 Excel Data System 📊
    </h2>

    <!-- FILE BUTTON -->

    <div class="mb-3 text-end">

        <a href="/files" class="btn btn-info">
            📂 ดูไฟล์ทั้งหมด
        </a>

    </div>

    <!-- UPLOAD -->

    <div class="card p-3 mb-4">

        <div class="card-header">
            📤 อัปโหลดไฟล์
        </div>

        <div class="card-body">

            <form action="/upload"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>เจ้าที่สั่ง</label>

                        <input list="customer_list"
                               name="customer"
                               class="form-control"
                               required>

                        <datalist id="customer_list">

                            <option value="S5 เจ้าเหลือง">
                            <option value="S6 เจ้าแดง">
                            <option value="เจ้า 3">
                            <option value="เจ้า 4">
                            <option value="เจ้า 5">
                            <option value="CGC">

                        </datalist>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>เกมส์</label>

                        <input list="game_list"
                               name="game"
                               class="form-control"
                               required>

                        <datalist id="game_list">

                            <option value="Call of duty">
                            <option value="Honkai Starrail">
                            <option value="Efootball Pes">
                            <option value="Wuthering Wave">
                            <option value="FC Mobile">
                            <option value="Last War">
                            <option value="Pokemon Go">
                            <option value="Pokemon TCG">
                            <option value="Zenless zone zero">

                        </datalist>

                    </div>

                </div>

                <div class="mb-3">

                    <input type="file"
                           name="file"
                           class="form-control"
                           required>

                </div>

                <button class="btn btn-success w-100">
                    Upload
                </button>

            </form>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="card p-3 mb-4">

        <div class="card-header">
            🔍 ค้นหาข้อมูล
        </div>

        <div class="card-body">

            <form action="/search"
                  method="get"
                  class="d-flex">

                <input type="text"
                       name="q"
                       class="form-control me-2"
                       placeholder="พิมพ์คำค้น..."
                       required>

                <button class="btn btn-primary">
                    ค้นหา
                </button>

            </form>

        </div>

    </div>

</div>

<div class="powered-by">

    ⚡ Powered by
    <span>MissSir.John</span>

</div>

{% endblock %}
