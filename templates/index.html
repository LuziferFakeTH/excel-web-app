{% extends "base.html" %}

{% block content %}

<style>

/* =========================
   LABEL
========================= */

label{
    color:#ffffff !important;
    font-weight:600;
    margin-bottom:6px;
    text-shadow:0 0 8px rgba(255,255,255,0.15);
}

/* =========================
   POWERED BY
========================= */

.powered-by{

    position:fixed;

    left:20px;
    bottom:15px;

    z-index:9999;

    font-size:13px;

    color:#ff66cc;

    letter-spacing:1px;

    opacity:0.8;

    text-shadow:
        0 0 8px rgba(255,0,170,0.5);
}

.powered-by span{
    color:#ffffff;
    opacity:0.9;
}

/* =========================
   GOJO DOMAIN
========================= */

#gojo-domain{

    position:fixed;
    inset:0;

    z-index:999999;

    display:none;

    overflow:hidden;

    background:
        radial-gradient(circle at center,
        rgba(35,0,70,0.98),
        rgba(0,0,0,1));
}

/* =========================
   STARS
========================= */

.stars,
.stars2,
.stars3{

    position:absolute;
    inset:0;

    background-repeat:repeat;

    animation:starMove linear infinite;
}

.stars{

    background-image:
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(1px 1px at 100px 150px, #fff, transparent),
        radial-gradient(2px 2px at 200px 80px, #a855f7, transparent),
        radial-gradient(2px 2px at 300px 200px, #fff, transparent),
        radial-gradient(1px 1px at 400px 120px, #60a5fa, transparent);

    background-size:500px 500px;

    animation-duration:80s;

    opacity:0.7;
}

.stars2{

    background-image:
        radial-gradient(2px 2px at 50px 60px, #fff, transparent),
        radial-gradient(2px 2px at 250px 300px, #c084fc, transparent),
        radial-gradient(1px 1px at 450px 150px, #fff, transparent),
        radial-gradient(2px 2px at 600px 400px, #93c5fd, transparent);

    background-size:700px 700px;

    animation-duration:120s;

    opacity:0.5;
}

.stars3{

    background-image:
        radial-gradient(3px 3px at 150px 100px, #fff, transparent),
        radial-gradient(2px 2px at 350px 250px, #f0abfc, transparent),
        radial-gradient(2px 2px at 550px 500px, #fff, transparent);

    background-size:900px 900px;

    animation-duration:160s;

    opacity:0.3;
}

@keyframes starMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-1000px);
    }
}

/* =========================
   BLACK HOLE
========================= */

.black-hole{

    position:absolute;

    top:50%;
    left:50%;

    width:320px;
    height:320px;

    transform:translate(-50%, -50%);

    border-radius:50%;

    background:
        radial-gradient(circle,
        #000 10%,
        #12001f 35%,
        #5b21b6 65%,
        rgba(168,85,247,0.15) 80%,
        transparent 100%);

    box-shadow:
        0 0 50px #7c3aed,
        0 0 120px rgba(124,58,237,0.9),
        0 0 250px rgba(59,130,246,0.6);

    animation:
        spinHole 4s linear infinite,
        pulseHole 2s ease infinite;
}

.space-ring{

    position:absolute;

    top:50%;
    left:50%;

    width:420px;
    height:420px;

    transform:translate(-50%, -50%);

    border-radius:50%;

    border:2px solid rgba(168,85,247,0.2);

    box-shadow:
        0 0 30px rgba(168,85,247,0.5),
        inset 0 0 30px rgba(96,165,250,0.2);

    animation:
        rotateRing 8s linear infinite;
}

@keyframes rotateRing{

    from{
        transform:translate(-50%, -50%) rotate(0deg);
    }

    to{
        transform:translate(-50%, -50%) rotate(360deg);
    }
}

@keyframes spinHole{

    from{
        transform:translate(-50%, -50%) rotate(0deg);
    }

    to{
        transform:translate(-50%, -50%) rotate(360deg);
    }
}

@keyframes pulseHole{

    0%{
        filter:brightness(1);
    }

    50%{
        filter:brightness(1.6);
    }

    100%{
        filter:brightness(1);
    }
}

/* =========================
   TEXT
========================= */

.domain-text{

    position:absolute;

    top:73%;
    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.domain-title{

    font-size:48px;
    font-weight:800;

    letter-spacing:8px;

    color:#d8b4fe;

    text-shadow:
        0 0 20px #9333ea,
        0 0 60px #7e22ce,
        0 0 120px rgba(168,85,247,0.5);

    animation:textPulse 2s infinite;
}

.domain-sub{

    margin-top:15px;

    font-size:18px;

    letter-spacing:5px;

    color:#f5d0fe;

    opacity:0.9;
}

@keyframes textPulse{

    0%{
        opacity:0.8;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.8;
    }
}

</style>

<!-- GOJO DOMAIN -->

<div id="gojo-domain">

    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="black-hole"></div>

    <div class="space-ring"></div>

    <div class="domain-text">

        <div class="domain-title">
            DOMAIN EXPANSION
        </div>

        <div class="domain-sub">
            CLEANING STORAGE...
        </div>

    </div>

    <!-- SOUND -->

    <audio id="domain-sound">
        <source src="/static/domain.mp3" type="audio/mpeg">
    </audio>

</div>

<!-- STORAGE -->

<div id="storage-box">

    <div style="font-weight:bold; margin-bottom:4px;">
        💾 STORAGE
    </div>

    <div class="small text-end">
        {{ storage.percent_used }}%
    </div>

    <div class="progress" style="height:8px;">

        <div id="storage-bar"
             class="progress-bar"
             style="width: {{ storage.percent_used }}%;">
        </div>

    </div>

    <div class="small text-end mt-1">
        {{ storage.remaining_kb }} KB left
    </div>

    <div class="mt-2 text-center">

        <button onclick="runVacuum()"
                class="btn btn-sm w-100"
                style="
                    background:#ff3b3b;
                    color:white;
                    box-shadow:0 0 10px rgba(255,0,0,0.4);
                ">

            🧹 ล้าง Storage

        </button>

    </div>

</div>

<script>

function runVacuum(){

    let pass = prompt("🔒 ใส่รหัสก่อนล้าง Storage:");

    if(pass !== "081041"){

        alert("❌ รหัสไม่ถูกต้อง");
        return;
    }

    let confirmAction = confirm(
        "⚠️ ระบบจะหยุดชั่วคราว\nยืนยันหรือไม่?"
    );

    if(!confirmAction) return;

    // DOMAIN SHOW

    const domain = document.getElementById("gojo-domain");

    domain.style.display = "block";

    // PLAY SOUND

    const sound = document.getElementById("domain-sound");

    sound.volume = 1;
    sound.play();

    // RUN VACUUM

    setTimeout(() => {

        fetch("/vacuum?pass=" + pass)

        .then(res => res.text())

        .then(data => {

            alert(data);

            location.reload();

        })

        .catch(err => {

            alert("❌ เกิดข้อผิดพลาด");

            location.reload();

        });

    }, 4500);
}

document.addEventListener("DOMContentLoaded", function(){

    let percent = {{ storage.percent_used }};
    let bar = document.getElementById("storage-bar");

    if(bar){

        if(percent < 30){

            bar.classList.add("neon-green");

        }else if(percent < 80){

            bar.classList.add("neon-yellow");

        }else{

            bar.classList.add("neon-red");
        }

    }

});

</script>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        📊 Excel Data System 📊
    </h2>

    <!-- SEARCH -->

    <div class="card p-3 mb-4">

        <div class="card-header">
            🔍 ค้นหาข้อมูล
        </div>

        <div class="card-body">

            <form action="/search"
                  method="get"
                  class="d-flex">

                <input type="text"
                       name="q"
                       class="form-control me-2"
                       placeholder="พิมพ์คำค้น..."
                       required>

                <button class="btn btn-primary">
                    ค้นหา
                </button>

            </form>

        </div>

    </div>

</div>

<div class="powered-by">

    ⚡ Powered by
    <span>MissSir.John</span>

</div>

{% endblock %}
